name: Publish AgentID to PyPI

on:
  release:
    types: [published]

jobs:
  build-wheels:
    name: Build Wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Build wheels via Maturin
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --manifest-path sdk/python/Cargo.toml
          
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels
          path: dist

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build-wheels]
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wheels
          path: dist
          
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
